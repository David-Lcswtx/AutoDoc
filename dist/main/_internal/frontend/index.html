<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDoc</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>AutoDoc</h1>
    </header>

    <section class="card">
        <h2>Documento</h2>
        <div class="campo">
            <label>Modelo (.docx)</label>
            <div class="linha">
                <input type="text" id="modelo" readonly>
                <button id="btnModelo">Selecionar</button>
            </div>
        </div>
        <div class="campo">
            <label>Destino</label>
            <div class="linha">
                <input type="text" id="destino" readonly>
                <button id="btnDestino">Selecionar</button>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>Dados do Cliente</h2>
        <input id="cliente_nome" placeholder="Nome Completo">
        <input id="cliente_nacionalidade" placeholder="Nacionalidade">
        <input id="cliente_estado_civil" placeholder="Estado Civil">
        <input id="cliente_data_nascimento" placeholder="Data de Nascimento">
        <input id="cliente_cpf" placeholder="CPF">
        <div class="linha">
            <input id="cliente_rg" placeholder="RG">
            <label>
                <input id="cliente_rg_novo" type="checkbox">
                RG Novo
            </label>
        </div>
    </section>

    <section class="card">
        <h2>Endereço</h2>
        <input id="end_cep" placeholder="CEP">
        <input id="end_logradouro" placeholder="Endereço">
        <input id="end_numero" placeholder="Número">
        <input id="end_complemento" placeholder="Complemento">
        <input id="end_bairro" placeholder="Bairro">
        <input id="end_municipio" placeholder="Município">
        <input id="end_uf" placeholder="UF">
    </section>

    <section class="card">
        <label class="checkbox">
            <input type="checkbox" id="possuiRepresentante">
            Possui representante
        </label>
    </section>

    <section class="card" id="representante" style="display: none;">
        <h2>Representante</h2>
        <input id="rep_nome" placeholder="Nome">
        <input id="rep_nacionalidade" placeholder="Nacionalidade">
        <input id="rep_estado_civil" placeholder="Estado Civil">
        <input id="rep_cpf" placeholder="CPF">
        <div class="linha">
            <input id="rep_rg" placeholder="RG">
            <label>
                <input id="rep_rg_novo" type="checkbox">
                RG Novo
            </label>
        </div>
    </section>

    <section class="acoes">
        <button id="limpar">Limpar</button>
        <button id="gerar">Gerar Documento</button>
    </section>

</div>

<script type="module" src="js/script.js"></script>

</body>
</html>
